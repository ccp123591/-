server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # SPA fallback（Vue Router history mode）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 20m;
        proxy_read_timeout 60s;
    }

    # Swagger UI + OpenAPI（方便调试）
    location /swagger-ui/      { proxy_pass http://backend:8080/swagger-ui/; }
    location = /swagger-ui.html { proxy_pass http://backend:8080/swagger-ui.html; }
    location /v3/api-docs      { proxy_pass http://backend:8080/v3/api-docs; }
    location /v3/api-docs/     { proxy_pass http://backend:8080/v3/api-docs/; }

    # H2 控制台
    location /h2-console/ { proxy_pass http://backend:8080/h2-console/; }

    # 上传资源（头像）
    location /uploads/ { proxy_pass http://backend:8080/uploads/; }

    # 静态缓存
    location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
